<!DOCTYPE html>
<html>
<head>
<style>
h2 {
	text-align: center;
	max-width: 50%;
    color: lightcoral;
}

table {
  width: 50%;
}

td, th {
  border: 1px solid pink;
  text-align: center;
  padding: 5px;
}

tr:nth-child(odd) {
  background-color: lightpink;
}
</style>
</head>
<body>

<h2>Days of the Week</h2>

<table>
  <tr>
    <th>Day</th>
    <th>Index</th>
  </tr>
  <tr>
    <td>Monday</td>
    <td>0</td>
  </tr>
  <tr>
   <td>Tuesday</td>
    <td>1</td>
  </tr>
  <tr>
    <td>Wednesday</td>
    <td>2</td>
  </tr>
  <tr>
	<td>Thursday</td>
    <td>3</td>
  </tr>
  <tr>
	<td>Friday</td>
    <td>4</td>
  </tr>
  <tr>
    <td>Saturday</td>
    <td>5</td>
  </tr>
  <tr>
    <td>Sunday</td>
    <td>6</td>
  </tr>
</table>

</body>
</html>
